<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Insights | Attrition Prediction</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-left">
            <div class="nav-brand">
                <!-- DevOpsCube Logo -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="38" height="38" aria-label="DevOpsCube logo">
                    <!-- Top face -->
                    <polygon points="50,8 88,28 50,48 12,28" fill="#ef5350"/>
                    <!-- Left face -->
                    <polygon points="12,28 50,48 50,92 12,72" fill="#b71c1c"/>
                    <!-- Right face -->
                    <polygon points="50,48 88,28 88,72 50,92" fill="#c62828"/>
                    <!-- Large gear -->
                    <circle cx="37" cy="27" r="13" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="2.8"/>
                    <circle cx="37" cy="27" r="5" fill="rgba(255,255,255,0.88)"/>
                    <rect x="35" y="11" width="4" height="5" rx="1" fill="rgba(255,255,255,0.88)"/>
                    <rect x="35" y="38" width="4" height="5" rx="1" fill="rgba(255,255,255,0.88)"/>
                    <rect x="19" y="25" width="5" height="4" rx="1" fill="rgba(255,255,255,0.88)"/>
                    <rect x="51" y="25" width="5" height="4" rx="1" fill="rgba(255,255,255,0.88)"/>
                    <rect x="23.5" y="14.5" width="4.5" height="4.5" rx="1" fill="rgba(255,255,255,0.88)" transform="rotate(-45 25.75 16.75)"/>
                    <rect x="47.5" y="14.5" width="4.5" height="4.5" rx="1" fill="rgba(255,255,255,0.88)" transform="rotate(45 49.75 16.75)"/>
                    <rect x="23.5" y="35.5" width="4.5" height="4.5" rx="1" fill="rgba(255,255,255,0.88)" transform="rotate(45 25.75 37.75)"/>
                    <rect x="47.5" y="35.5" width="4.5" height="4.5" rx="1" fill="rgba(255,255,255,0.88)" transform="rotate(-45 49.75 37.75)"/>
                    <!-- Small gear -->
                    <circle cx="64" cy="22" r="8" fill="none" stroke="rgba(255,255,255,0.72)" stroke-width="2.2"/>
                    <circle cx="64" cy="22" r="3" fill="rgba(255,255,255,0.72)"/>
                    <rect x="62" y="12" width="3.5" height="4" rx="0.8" fill="rgba(255,255,255,0.72)"/>
                    <rect x="62" y="28" width="3.5" height="4" rx="0.8" fill="rgba(255,255,255,0.72)"/>
                    <rect x="55" y="20" width="4" height="3.5" rx="0.8" fill="rgba(255,255,255,0.72)"/>
                    <rect x="69" y="20" width="4" height="3.5" rx="0.8" fill="rgba(255,255,255,0.72)"/>
                    <!-- DEV on left face -->
                    <text x="15" y="74" font-family="Arial,sans-serif" font-size="11.5" font-weight="bold" fill="rgba(255,255,255,0.95)">DEV</text>
                    <!-- OPS on right face -->
                    <text x="54" y="74" font-family="Arial,sans-serif" font-size="11.5" font-weight="bold" fill="rgba(255,255,255,0.95)">OPS</text>
                </svg>
                <span class="nav-brand-text">DevOpsCube</span>
            </div>
        </div>
        <div class="nav-right">
            <button class="theme-toggle" id="themeToggle" title="Toggle dark / light mode">
                <i data-lucide="moon"></i>
            </button>
            <div class="profile-wrapper" id="profileWrapper">
                <div class="user-avatar" id="userAvatar" title="User profile">
                    <i data-lucide="user"></i>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-dropdown-avatar">
                        <i data-lucide="user"></i>
                    </div>
                    <div class="profile-dropdown-name">DevOpsCube</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="app-wrapper">
        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="brand mb-4">
                    <div class="brand-icon">
                        <i data-lucide="brain-circuit"></i>
                    </div>
                    <span class="brand-text">HR Insights AI</span>
                </div>
                <h1>Employee Retention Predictor</h1>
                <p>Enter an employee ID to instantly analyze attrition risk using AI.</p>
            </header>

            <!-- Employee Lookup Section (The only part visible) -->
            <section class="card">
                <div class="header-content">
                    <h2><i data-lucide="search"></i> Attrition Risk Analysis</h2>
                    <p>Enter an ID to generate a risk assessment from the latest HR data.</p>
                </div>
                <div class="lookup-input-group">
                    <input type="text" id="employeeIdInput" placeholder="Enter Employee ID (e.g., 9063)">
                    <button type="button" id="lookupBtn" class="btn-secondary">
                        <i data-lucide="zap"></i> Generate Prediction
                    </button>
                </div>
                <div id="fetchStatus"></div>
            </section>

            <!-- Results Section (Hidden by default, shown after prediction) -->
            <div id="result" class="mt-4" style="display: none;"></div>
        </main>
    </div>

    <!-- Custom Popup / Modal for Errors -->
    <div id="customModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon"></div>
            <h3 id="modalTitle">Notification</h3>
            <p id="modalMessage">Message content goes here.</p>
            <button class="btn btn-primary" onclick="closeModal()">Dismiss</button>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
